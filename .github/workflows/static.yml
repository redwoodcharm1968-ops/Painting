name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Build deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp .nojekyll _site/
          cp *.html _site/
          cp -r css js assets blog _site/
          echo "Asset check:"
          ls -la _site/assets/work/
          file _site/assets/work/hero.jpg
          test "$(head -c 2 _site/assets/work/hero.jpg | od -An -tx1 | tr -d ' ')" = "ffd8"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
